name: Build SoftHSM

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git

      - name: Install dependencies
        run: ./vcpkg/vcpkg install botan:x64-windows openssl:x64-windows

      - name: Configure CMake
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: softhsm-windows
          path: build/bin/Release/*
